name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./internal/...

      - name: MCP protocol tests
        run: go test -v ./test/mcp/...

      - name: Install ziti CLI
        run: |
          curl -sS https://get.openziti.io/install.bash | sudo bash -s openziti
          ziti version

      - name: Integration tests
        run: go test -v -timeout 5m ./test/integration/...

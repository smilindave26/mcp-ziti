site_name: mcp-ziti
site_description: MCP server for the OpenZiti Management API
site_url: https://smilindave26.github.io/mcp-ziti/
repo_url: https://github.com/smilindave26/mcp-ziti
repo_name: smilindave26/mcp-ziti

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Installation: installation.md
  - Authentication: authentication.md
  - Agent Setup: agent-setup.md
  - Tools: tools.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
